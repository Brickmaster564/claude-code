<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body style="margin:0; padding:0; background-color:#111111; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;">
<table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background-color:#111111;">
<tr><td align="center" style="padding:32px 16px;">
<table role="presentation" width="640" cellpadding="0" cellspacing="0" style="max-width:640px; width:100%;">

<!-- HEADER -->
<tr><td style="padding:24px 32px 16px; border-bottom:2px solid #c0945c;">
  <h1 style="margin:0; font-size:28px; font-weight:700; color:#c0945c; letter-spacing:0.5px;">BHW Intel</h1>
  <p style="margin:6px 0 0; font-size:14px; color:#888888;">{{DATE}}</p>
</td></tr>

<!-- QUICK HITS -->
<tr><td style="padding:28px 32px 0;">
  <h2 style="margin:0 0 16px; font-size:13px; font-weight:700; color:#c0945c; letter-spacing:2px; text-transform:uppercase;">Quick Hits</h2>

  {{QUICK_HITS}}
  <!--
  Repeat this block for each one-liner:
  <p style="margin:0 0 10px; font-size:14px; line-height:1.6; color:#e0e0e0; padding-left:12px; border-left:3px solid #c0945c;">{{ONE_LINER}}</p>
  -->
</td></tr>

<!-- DIVIDER -->
<tr><td style="padding:0 32px;"><hr style="border:none; border-top:1px solid #333333; margin:8px 0;"></td></tr>

<!-- BULLETPROOFING -->
<tr><td style="padding:28px 32px 0;">
  <h2 style="margin:0 0 20px; font-size:13px; font-weight:700; color:#c0945c; letter-spacing:2px; text-transform:uppercase;">Bulletproofing</h2>

  {{BULLETPROOFING_ITEMS}}
  <!--
  Repeat this block for each insight:
  <div style="margin-bottom:20px;">
    <p style="margin:0 0 6px; font-size:14px; font-weight:700; color:#e0e0e0;"><a href="{{THREAD_URL}}" style="color:#e0e0e0; text-decoration:underline;">{{THREAD_TITLE}}</a></p>
    <p style="margin:0; font-size:14px; line-height:1.6; color:#cccccc;">{{INSIGHT}}</p>
    <p style="margin:4px 0 0; font-size:12px; color:#888888;">{{SUBFORUM}}</p>
  </div>
  -->
</td></tr>

<!-- DIVIDER -->
<tr><td style="padding:0 32px;"><hr style="border:none; border-top:1px solid #333333; margin:8px 0;"></td></tr>

<!-- AD PERFORMANCE -->
<tr><td style="padding:24px 32px 0;">
  <h2 style="margin:0 0 20px; font-size:13px; font-weight:700; color:#c0945c; letter-spacing:2px; text-transform:uppercase;">Ad Performance</h2>

  {{PERFORMANCE_ITEMS}}
  <!--
  Repeat this block for each insight:
  <div style="margin-bottom:20px;">
    <p style="margin:0 0 6px; font-size:14px; font-weight:700; color:#e0e0e0;"><a href="{{THREAD_URL}}" style="color:#e0e0e0; text-decoration:underline;">{{THREAD_TITLE}}</a></p>
    <p style="margin:0; font-size:14px; line-height:1.6; color:#cccccc;">{{INSIGHT}}</p>
    <p style="margin:4px 0 0; font-size:12px; color:#888888;">{{SUBFORUM}}</p>
  </div>
  -->
</td></tr>

<!-- FOOTER -->
<tr><td style="padding:28px 32px 32px;">
  <hr style="border:none; border-top:1px solid #333333; margin:0 0 16px;">
  <p style="margin:0; font-size:12px; color:#666666; text-align:center;">End of briefing.</p>
</td></tr>

</table>
</td></tr>
</table>
</body>
</html>
